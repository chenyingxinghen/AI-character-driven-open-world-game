<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI角色驱动开放世界游戏 - 新版本</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            margin: 0;
            color: #4a5568;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .status.disconnected {
            background-color: #fee;
            color: #c53030;
            border: 1px solid #fc8181;
        }
        
        .status.connected {
            background-color: #f0fff4;
            color: #38a169;
            border: 1px solid #68d391;
        }
        
        /* 登录面板 */
        .login-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .login-panel h2 {
            color: #4a5568;
            margin-bottom: 20px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .login-form input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-form button {
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-form button:hover {
            transform: translateY(-2px);
        }
        
        /* 会话管理面板 */
        .session-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        
        .session-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .session-item {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .session-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .session-item h4 {
            margin: 0 0 10px 0;
            color: #2d3748;
        }
        
        .session-item .session-info {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
        }
        
        .session-item .session-actions {
            display: flex;
            gap: 10px;
        }
        
        .session-item button {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-load {
            background: #4299e1;
            color: white;
        }
        
        .btn-rename {
            background: #ed8936;
            color: white;
        }
        
        .btn-delete {
            background: #e53e3e;
            color: white;
        }
        
        .create-session {
            text-align: center;
            padding: 20px;
            border: 2px dashed #cbd5e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .create-session:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        /* 游戏面板 */
        .game-panel {
            display: none;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .game-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-size: 18px;
            font-weight: bold;
        }
        
        .game-controls {
            display: flex;
            gap: 10px;
        }
        
        .game-controls button {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .game-controls button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .game-content {
            display: flex;
            height: 600px;
        }
        
        .game-display {
            flex: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e2e8f0;
        }
        
        .scene-display {
            flex: 1;
            background: #2d3748;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        
        .conversation-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .game-sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .action-buttons {
            padding: 20px;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .action-btn {
            padding: 10px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .action-btn:hover {
            background: #3182ce;
        }
        
        .input-area {
            padding: 20px;
            background: white;
        }
        
        .input-box {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            resize: none;
            font-family: inherit;
        }
        
        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }
        
        .message.character {
            background: #e6fffa;
            border-left: 4px solid #38b2ac;
        }
        
        .message.player {
            background: #ebf4ff;
            border-left: 4px solid #4299e1;
            margin-left: auto;
        }
        
        .message.narration {
            background: #fefcbf;
            border-left: 4px solid #d69e2e;
            font-style: italic;
        }
        
        .message.system {
            background: #fed7d7;
            border-left: 4px solid #e53e3e;
            text-align: center;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 AI角色驱动开放世界游戏</h1>
            <div id="connectionStatus" class="status disconnected">
                🔴 未连接到服务器
            </div>
        </div>

        <!-- 登录面板 -->
        <div id="loginPanel" class="login-panel">
            <h2>🚀 开始你的冒险</h2>
            <p>请输入你的用户名来开始游戏。如果是新用户，系统会自动为你创建账号。</p>
            <div class="login-form">
                <input type="text" id="usernameInput" placeholder="请输入用户名" maxlength="50">
                <button onclick="login()">登录游戏</button>
            </div>
        </div>

        <!-- 会话管理面板 -->
        <div id="sessionPanel" class="session-panel hidden">
            <h2>📚 我的游戏存档</h2>
            <div id="sessionList" class="session-list">
                <!-- 会话列表将在这里动态生成 -->
            </div>
            <div class="create-session" onclick="showCreateSessionDialog()">
                <h3>➕ 创建新的冒险</h3>
                <p>开始一个全新的故事</p>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="logout()" style="background: #e53e3e; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">
                    退出登录
                </button>
            </div>
        </div>

        <!-- 游戏面板 -->
        <div id="gamePanel" class="game-panel">
            <div class="game-header">
                <div class="game-title" id="gameTitle">游戏中...</div>
                <div class="game-controls">
                    <button onclick="saveGame()">💾 保存</button>
                    <button onclick="exitGame()">🚪 退出</button>
                </div>
            </div>
            
            <div class="game-content">
                <div class="game-display">
                    <div class="scene-display">
                        <h3>🌍 场景描述</h3>
                        <div id="sceneDescription">
                            正在加载场景...
                        </div>
                    </div>
                    
                    <div class="conversation-area" id="conversationArea">
                        <div class="message system">
                            欢迎来到AI驱动的开放世界！在这里，你可以与AI角色对话，探索动态生成的世界。
                        </div>
                    </div>
                </div>
                
                <div class="game-sidebar">
                    <div class="action-buttons">
                        <h4>🎯 快捷操作</h4>
                        <div class="action-grid" id="actionGrid">
                            <button class="action-btn" onclick="quickAction('look')">👀 观察周围</button>
                            <button class="action-btn" onclick="quickAction('talk')">💬 与人交谈</button>
                            <button class="action-btn" onclick="quickAction('move')">🚶 四处走动</button>
                            <button class="action-btn" onclick="quickAction('inventory')">🎒 查看背包</button>
                        </div>
                    </div>
                    
                    <div class="input-area">
                        <h4>✍️ 自由输入</h4>
                        <textarea id="playerInput" class="input-box" placeholder="描述你想要做的事情...例如：'我想去探索附近的森林'"></textarea>
                        <button class="send-btn" onclick="sendInput()">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentUser = null;
        let currentSession = null;
        let sessions = [];

        // 连接到游戏服务器
        function connectToServer() {
            const wsUrl = 'ws://localhost:8080';
            ws = new WebSocket(wsUrl);
            
            ws.onopen = function() {
                updateConnectionStatus(true);
                console.log('Connected to game server');
            };
            
            ws.onmessage = function(event) {
                handleServerMessage(JSON.parse(event.data));
            };
            
            ws.onclose = function() {
                updateConnectionStatus(false);
                console.log('Disconnected from game server');
                // 尝试重连
                setTimeout(connectToServer, 3000);
            };
            
            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                updateConnectionStatus(false);
            };
        }

        // 更新连接状态
        function updateConnectionStatus(connected) {
            const statusElement = document.getElementById('connectionStatus');
            if (connected) {
                statusElement.className = 'status connected';
                statusElement.textContent = '🟢 已连接到服务器';
            } else {
                statusElement.className = 'status disconnected';
                statusElement.textContent = '🔴 未连接到服务器';
            }
        }

        // 发送消息到服务器
        function sendMessage(type, payload) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: type,
                    payload: payload,
                    timestamp: new Date()
                }));
            } else {
                console.error('WebSocket is not connected');
            }
        }

        // 处理服务器消息
        function handleServerMessage(message) {
            console.log('Received message:', message);
            
            switch (message.type) {
                case 'login_success':
                    handleLoginSuccess(message.payload);
                    break;
                case 'user_sessions':
                    handleUserSessions(message.payload);
                    break;
                case 'session_created':
                    handleSessionCreated(message.payload);
                    break;
                case 'session_loaded':
                    handleSessionLoaded(message.payload);
                    break;
                case 'character_response':
                    addMessage(message.payload);
                    break;
                case 'scene_update':
                    updateScene(message.payload);
                    break;
                case 'error':
                    showError(message.payload.message);
                    break;
                default:
                    console.log('Unhandled message type:', message.type);
            }
        }

        // 登录
        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('请输入用户名');
                return;
            }
            
            sendMessage('login', { username: username });
        }

        // 处理登录成功
        function handleLoginSuccess(payload) {
            currentUser = payload;
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('sessionPanel').classList.remove('hidden');
            
            // 获取用户的会话列表
            sendMessage('get_user_sessions', {});
        }

        // 处理用户会话列表
        function handleUserSessions(payload) {
            sessions = payload.sessions;
            renderSessionList();
        }

        // 渲染会话列表
        function renderSessionList() {
            const sessionList = document.getElementById('sessionList');
            sessionList.innerHTML = '';
            
            sessions.forEach(session => {
                const sessionItem = document.createElement('div');
                sessionItem.className = 'session-item';
                sessionItem.innerHTML = `
                    <h4>${session.session_name}</h4>
                    <div class="session-info">
                        创建时间: ${new Date(session.created_at).toLocaleString('zh-CN')}<br>
                        最后活动: ${new Date(session.last_activity).toLocaleString('zh-CN')}
                    </div>
                    <div class="session-actions">
                        <button class="btn-load" onclick="loadSession('${session.id}')">加载</button>
                        <button class="btn-rename" onclick="renameSession('${session.id}')">重命名</button>
                        <button class="btn-delete" onclick="deleteSession('${session.id}')">删除</button>
                    </div>
                `;
                sessionList.appendChild(sessionItem);
            });
        }

        // 创建新会话
        function showCreateSessionDialog() {
            const sessionName = prompt('请输入新存档的名称:', `冒险 ${new Date().toLocaleString('zh-CN')}`);
            if (sessionName) {
                sendMessage('create_session', { sessionName: sessionName });
            }
        }

        // 处理会话创建成功
        function handleSessionCreated(payload) {
            currentSession = payload;
            document.getElementById('gameTitle').textContent = payload.sessionName;
            document.getElementById('sessionPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            
            // 清空对话区域
            document.getElementById('conversationArea').innerHTML = `
                <div class="message system">
                    欢迎来到新的冒险：${payload.sessionName}
                </div>
            `;
        }

        // 加载会话
        function loadSession(sessionId) {
            sendMessage('load_session', { sessionId: sessionId });
        }

        // 处理会话加载成功
        function handleSessionLoaded(payload) {
            currentSession = payload;
            document.getElementById('gameTitle').textContent = payload.sessionName;
            document.getElementById('sessionPanel').classList.add('hidden');
            document.getElementById('gamePanel').classList.remove('hidden');
            
            // 清空对话区域，准备接收游戏状态
            document.getElementById('conversationArea').innerHTML = `
                <div class="message system">
                    已加载存档：${payload.sessionName}
                </div>
            `;
        }

        // 重命名会话
        function renameSession(sessionId) {
            const newName = prompt('请输入新的存档名称:');
            if (newName) {
                sendMessage('rename_session', { sessionId: sessionId, newName: newName });
                // 重新获取会话列表
                setTimeout(() => sendMessage('get_user_sessions', {}), 500);
            }
        }

        // 删除会话
        function deleteSession(sessionId) {
            if (confirm('确定要删除这个存档吗？此操作无法撤销。')) {
                sendMessage('delete_session', { sessionId: sessionId });
                // 重新获取会话列表
                setTimeout(() => sendMessage('get_user_sessions', {}), 500);
            }
        }

        // 发送玩家输入
        function sendInput() {
            const input = document.getElementById('playerInput').value.trim();
            if (!input) return;
            
            // 添加玩家消息到对话区域
            addMessage({
                characterId: 'player',
                characterName: '你',
                content: input,
                type: 'player_input'
            });
            
            // 发送到服务器
            sendMessage('player_input', {
                sessionId: currentSession.sessionId,
                playerId: currentUser.userId,
                input: input
            });
            
            // 清空输入框
            document.getElementById('playerInput').value = '';
        }

        // 快捷操作
        function quickAction(action) {
            let input = '';
            switch (action) {
                case 'look':
                    input = '我想仔细观察一下周围的环境';
                    break;
                case 'talk':
                    input = '我想和附近的人交谈';
                    break;
                case 'move':
                    input = '我想四处走动，探索这个地方';
                    break;
                case 'inventory':
                    input = '我想查看一下我的背包里有什么';
                    break;
            }
            
            if (input) {
                document.getElementById('playerInput').value = input;
                sendInput();
            }
        }

        // 添加消息到对话区域
        function addMessage(message) {
            const conversationArea = document.getElementById('conversationArea');
            const messageDiv = document.createElement('div');
            
            let messageClass = 'message ';
            if (message.characterId === 'player') {
                messageClass += 'player';
            } else if (message.type === 'narration') {
                messageClass += 'narration';
            } else if (message.characterId === 'narrator') {
                messageClass += 'narration';
            } else {
                messageClass += 'character';
            }
            
            messageDiv.className = messageClass;
            messageDiv.innerHTML = `
                <strong>${message.characterName}:</strong> ${message.content}
            `;
            
            conversationArea.appendChild(messageDiv);
            conversationArea.scrollTop = conversationArea.scrollHeight;
        }

        // 更新场景描述
        function updateScene(sceneData) {
            document.getElementById('sceneDescription').innerHTML = `
                <h4>${sceneData.title || '当前位置'}</h4>
                <p>${sceneData.description}</p>
            `;
        }

        // 保存游戏
        function saveGame() {
            // 游戏会自动保存，显示提示
            addMessage({
                characterId: 'system',
                characterName: '系统',
                content: '游戏已自动保存。',
                type: 'system'
            });
        }

        // 退出游戏
        function exitGame() {
            if (confirm('确定要退出当前游戏回到存档列表吗？')) {
                document.getElementById('gamePanel').classList.add('hidden');
                document.getElementById('sessionPanel').classList.remove('hidden');
                currentSession = null;
                
                // 重新获取会话列表
                sendMessage('get_user_sessions', {});
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                currentUser = null;
                currentSession = null;
                sessions = [];
                
                document.getElementById('sessionPanel').classList.add('hidden');
                document.getElementById('gamePanel').classList.add('hidden');
                document.getElementById('loginPanel').classList.remove('hidden');
                document.getElementById('usernameInput').value = '';
            }
        }

        // 显示错误消息
        function showError(message) {
            alert('错误: ' + message);
        }

        // 页面加载完成后连接服务器
        window.addEventListener('load', function() {
            connectToServer();
        });

        // Enter键发送消息
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                sendInput();
            } else if (e.key === 'Enter' && document.activeElement.id === 'usernameInput') {
                login();
            }
        });
    </script>
</body>
</html>
