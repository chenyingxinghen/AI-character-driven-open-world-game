<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Driven Open World Game | Immersive Interface</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #a855f7;
            --bg-dark: #0f172a;
            --accent: #fbbf24;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('C:/Users/29454/.gemini/antigravity/brain/6950df7c-d47f-4a87-a174-3e18c1f84c3a/fantasy_landscape_background_1769507168202.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            justify-content: space-between;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .char-portrait {
            width: 100%;
            height: 200px;
            background: #1e293b;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            position: relative;
        }

        .char-portrait img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stat-item {
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
        }

        .stat-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }

        .narrative-feed {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            overflow-y: auto;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .message {
            max-width: 85%;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-player {
            align-self: flex-end;
            text-align: right;
        }

        .message-ai {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 18px;
            line-height: 1.6;
            font-size: 1rem;
        }

        .message-player .message-bubble {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 8px 16px rgba(99, 102, 241, 0.2);
        }

        .message-ai .message-bubble {
            background: rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .message-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-container {
            height: 80px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 0 10px 0 25px;
            transition: border-color 0.3s ease;
        }

        .input-container:focus-within {
            border-color: var(--primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        .send-btn {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border: none;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .pipeline-status {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.3s ease;
        }

        .step-active .step-dot {
            background: var(--primary);
            box-shadow: 0 0 8px var(--primary);
        }

        .step-active .step-label {
            color: var(--text-main);
            font-weight: 500;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .world-view {
            height: 180px;
            border-radius: 15px;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        .tension-meter {
            height: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .session-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }

        .session-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .session-info {
            flex: 1;
        }

        .session-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
            display: block;
        }

        .session-date {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .load-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-left: 8px;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .session-actions {
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>

    <!-- 登录/会话初始化覆盖层 -->
    <div id="setup-overlay"
        style="position: fixed; inset: 0; background: var(--bg-dark); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px);">
        <div class="panel" style="width: 400px; text-align: center;">
            <div class="logo" style="font-size: 2rem; margin-bottom: 30px;">AETHER NEXUS</div>
            <div id="login-step">
                <p style="margin-bottom: 20px; color: var(--text-dim);">请输入您的冒险者 ID 以太：</p>
                <input type="text" id="usernameInput" placeholder="用户名..."
                    style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; display: block;"
                    value="Adventurer">
                <button class="nav-btn" id="loginBtn"
                    style="width: 100%; padding: 12px; background: var(--primary);">进入世界</button>
            </div>
            <div id="session-step" style="display: none;">
                <p style="margin-bottom: 20px; color: var(--text-dim);">创建一个新会话或加载既存记录：</p>

                <div id="session-list" class="session-list" style="display: none;">
                    <!-- 动态加载会话列表 -->
                </div>

                <div style="border-top: 1px solid var(--glass-border); padding-top: 15px; margin-top: 10px;">
                    <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 10px;">或者开启一个新冒险：</p>
                    <input type="text" id="sessionNameInput" placeholder="会话名称 (例如: 密林探险)..."
                        style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; display: block;"
                        value="幽光密林之行">
                    <button class="nav-btn" id="startBtn"
                        style="width: 100%; padding: 12px; background: var(--secondary);">开启全新征程</button>
                </div>
            </div>
            <p id="setup-status" style="margin-top: 20px; font-size: 0.8rem; color: var(--primary);"></p>
        </div>
    </div>

    <header>
        <div class="logo">AETHER NEXUS</div>
        <div class="nav-actions">
            <button class="nav-btn">角色大纲</button>
            <button class="nav-btn">世界记录</button>
            <button class="nav-btn">系统设置</button>
        </div>
    </header>

    <main id="game-main" style="visibility: hidden;">
        <!-- 左侧：角色信息 -->
        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">当前目标角色</div>
                <div class="char-portrait">
                    <img src="https://images.unsplash.com/photo-1519067736912-42cc95716e48?auto=format&fit=crop&q=80&w=400"
                        alt="Character">
                </div>
                <h3 id="target-char-name">艾琳娜·晨晖 (Elara)</h3>
                <p id="target-char-desc" style="font-size: 0.85rem; color: var(--text-dim); margin: 8px 0 20px;">
                    银翼骑士团的见习向导</p>

                <div class="stat-item">
                    <div class="stat-label"><span>好感度 (Affinity)</span><span id="affinity-val">0%</span></div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="affinity-bar" style="width: 0%;"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-label"><span>情绪值 (Mood)</span><span id="mood-val">未知</span></div>
                    <div class="stat-bar">
                        <div class="stat-fill" id="mood-bar" style="width: 0%; background: var(--primary);"></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">系统处理流水线 (实时)</div>
                <div class="pipeline-status">
                    <div class="step" id="step-intent">
                        <div class="step-dot"></div>
                        <div class="step-label">1. 意图分类 (JSON Schema)</div>
                    </div>
                    <div class="step" id="step-director">
                        <div class="step-dot"></div>
                        <div class="step-label">2. 导演冲突/张力评估</div>
                    </div>
                    <div class="step" id="step-domain">
                        <div class="step-dot"></div>
                        <div class="step-label">3. 领域逻辑 (Actions) 执行</div>
                    </div>
                    <div class="step" id="step-narrative">
                        <div class="step-dot"></div>
                        <div class="step-label">4. 叙事全量合成渲染</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="narrative-feed" id="feed"></div>
            <div class="input-container">
                <input type="text" id="userInput" placeholder="输入你想说的话或动作..." autocomplete="off">
                <button class="send-btn" id="sendBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">当前位置</div>
                <div class="world-view" id="location-title">[ 加载中... ]</div>
                <p id="location-desc" style="font-size: 0.85rem; line-height: 1.5;">世界数据正在从以太中同步...</p>
            </div>

            <div class="panel">
                <div class="panel-title">叙事张力 (Director Control)</div>
                <div class="tension-meter">
                    <div
                        style="flex: 1; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; position: relative; overflow: hidden;">
                        <div id="tension-bar"
                            style="height: 100%; background: #ef4444; width: 0%; transition: width 0.5s ease;"></div>
                    </div>
                    <span style="font-size: 0.8rem; font-weight: 600; color: #ef4444;" id="tension-val">0%</span>
                </div>
                <p id="conflict-desc" style="font-size: 0.8rem; color: var(--text-dim); margin-top: 10px;">
                    导演系统正在评估当前叙事曲线。</p>
            </div>
        </div>
    </main>

    <script>
        const setupOverlay = document.getElementById('setup-overlay');
        const gameMain = document.getElementById('game-main');
        const setupStatus = document.getElementById('setup-status');
        const feed = document.getElementById('feed');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let socket;
        let sessionId = null;
        let playerId = null;
        let username = null;

        const pipelineSteps = ['step-intent', 'step-director', 'step-domain', 'step-narrative'];

        function initWebSocket() {
            setupStatus.innerText = "正在连接以太节点...";
            socket = new WebSocket('ws://localhost:8080');

            socket.onopen = () => {
                setupStatus.innerText = "连接成功。";
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleServerMessage(msg);
            };

            socket.onclose = () => {
                setupStatus.innerText = "连接已断开，请刷新重试。";
                setupStatus.style.color = "#ef4444";
            };

            socket.onerror = (err) => {
                console.error("WS Error:", err);
                setupStatus.innerText = "连接错误。";
            };
        }

        function handleServerMessage(msg) {
            console.log("RX:", msg.type, msg.payload);
            const { type, payload } = msg;

            switch (type) {
                case 'login_success':
                    username = payload.username;
                    document.getElementById('login-step').style.display = 'none';
                    document.getElementById('session-step').style.display = 'block';
                    setupStatus.innerText = `欢迎，${username}。正在检索您的冒险记录...`;
                    // 自动拉取会话列表
                    socket.send(JSON.stringify({ type: 'get_user_sessions', payload: {} }));
                    break;

                case 'user_sessions':
                    renderSessionList(payload.sessions);
                    break;

                case 'session_deleted':
                    setupStatus.innerText = "记录已成功抹除。";
                    // 重新获取列表
                    socket.send(JSON.stringify({ type: 'get_user_sessions', payload: {} }));
                    break;

                case 'setup_progress':
                    setupStatus.innerText = payload.message || "进行中...";
                    if (payload.step === 'lore') setupStatus.style.color = "#818cf8";
                    if (payload.step === 'outline') setupStatus.style.color = "#a78bfa";
                    if (payload.step === 'scene') setupStatus.style.color = "#f472b6";
                    break;

                case 'session_created':
                case 'session_loaded':
                    sessionId = payload.sessionId;
                    playerId = payload.playerId || 'player1'; // 修正默认值
                    setupOverlay.style.display = 'none';
                    gameMain.style.visibility = 'visible';

                    // 如果存在历史对话，清空当前 feed 并重新渲染
                    if (payload.conversations && payload.conversations.length > 0) {
                        feed.innerHTML = '';
                        payload.conversations.forEach(conv => {
                            const type = conv.message_type === 'player_input' ? 'player' : 'ai';
                            addMessage(conv.content, type, conv.character_id === 'system' ? 'SYSTEM' : (conv.character_id === 'narrator' ? 'NARRATOR' : conv.character_id), true);
                        });
                        addMessage("--- 记忆已从深度以太中同步 ---", "ai");
                    } else {
                        addMessage("叙事引擎已加载，欢迎进入新世界。", "ai");
                    }
                    break;

                case 'character_response':
                    addMessage(payload.content, payload.characterId === 'narrator' ? 'ai' : 'ai', payload.characterName);
                    // 恢复输入
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                    break;

                case 'scene_update':
                    document.getElementById('location-title').innerText = `[ ${payload.title || '未知'} ]`;
                    document.getElementById('location-desc').innerText = payload.description;
                    break;

                case 'game_state_update':
                    document.getElementById('location-title').innerText = `[ ${payload.currentLocation} ]`;
                    break;

                case 'pipeline_actions':
                    visualizePipeline(payload.actions);
                    break;

                case 'error':
                    addMessage(`[错误] ${payload.message}`, 'ai');
                    // 恢复所有按钮
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    document.getElementById('loginBtn').disabled = false;
                    document.getElementById('loginBtn').innerText = "进入世界";
                    document.getElementById('startBtn').disabled = false;
                    document.getElementById('startBtn').innerText = "开启征程";
                    break;
            }
        }

        async function visualizePipeline(actions) {
            // 通过解析 GameActions 来模拟流水线步进
            for (const stepId of pipelineSteps) {
                const el = document.getElementById(stepId);
                el.classList.add('step-active');
                el.querySelector('.step-dot').style.transform = 'scale(1.5)';
                await new Promise(r => setTimeout(r, 400));
            }

            // 简单模拟基于动作的属性变化
            actions.forEach(action => {
                if (action.type === 'STORY_EVENT') {
                    const tensionValEl = document.getElementById('tension-val');
                    const currentTension = parseInt(tensionValEl.innerText) || 0;
                    const tension = Math.min(100, currentTension + 15);
                    document.getElementById('tension-bar').style.width = tension + '%';
                    tensionValEl.innerText = tension + '%';
                }
            });

            // 重置点
            setTimeout(() => {
                pipelineSteps.forEach(id => {
                    const el = document.getElementById(id);
                    el.classList.remove('step-active');
                    el.querySelector('.step-dot').style.transform = 'scale(1)';
                });
            }, 2000);
        }

        function renderSessionList(sessions) {
            const listContainer = document.getElementById('session-list');
            if (!sessions || sessions.length === 0) {
                listContainer.style.display = 'none';
                setupStatus.innerText = "未发现既存记录。";
                return;
            }

            listContainer.style.display = 'flex';
            listContainer.innerHTML = '';
            setupStatus.innerText = "发现既存记录。";

            sessions.forEach(s => {
                const item = document.createElement('div');
                item.className = 'session-item';
                const dateStr = s.created_at ? new Date(s.created_at).toLocaleString() : '未知时间';

                item.innerHTML = `
                    <div class="session-info">
                        <span class="session-name">${s.session_name || '未命名历险'}</span>
                        <span class="session-date">${dateStr}</span>
                    </div>
                    <div class="session-actions">
                        <button class="load-btn">继续冒险</button>
                        <button class="delete-btn">删除</button>
                    </div>
                `;

                item.querySelector('.load-btn').onclick = (e) => {
                    e.stopPropagation();
                    const btn = item.querySelector('.load-btn');
                    btn.innerText = "载入中...";
                    btn.disabled = true;
                    socket.send(JSON.stringify({
                        type: 'load_session',
                        payload: { sessionId: s.id }
                    }));
                };

                item.querySelector('.delete-btn').onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`确定要永久删除“${s.session_name}”吗？此操作无法撤销。`)) {
                        const btn = item.querySelector('.delete-btn');
                        btn.innerText = "正在删除...";
                        btn.disabled = true;
                        socket.send(JSON.stringify({
                            type: 'delete_session',
                            payload: { sessionId: s.id }
                        }));
                    }
                };

                listContainer.appendChild(item);
            });
        }

        function addMessage(content, type, sender = "NARRATOR", instant = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${type === 'player' ? 'player' : 'ai'}`;
            msgDiv.innerHTML = `<div class="message-label">${type === 'player' ? 'YOU' : sender}</div><div class="message-bubble"></div>`;
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;

            const bubble = msgDiv.querySelector('.message-bubble');
            if (type === 'player' || instant) {
                bubble.innerText = content;
            } else {
                let i = 0;
                function typeWriter() {
                    if (i < content.length) {
                        bubble.innerHTML += content.charAt(i++);
                        feed.scrollTop = feed.scrollHeight;
                        setTimeout(typeWriter, 20);
                    }
                }
                typeWriter();
            }
        }

        function handleSend() {
            const input = userInput.value.trim();
            if (!input || !sessionId || userInput.disabled) return;

            addMessage(input, 'player');
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            socket.send(JSON.stringify({
                type: 'player_input',
                payload: { sessionId, playerId, input }
            }));
        }

        // Logic Bindings
        document.getElementById('loginBtn').onclick = function () {
            const user = document.getElementById('usernameInput').value || 'Guest';
            this.disabled = true;
            this.innerText = "通过以太验证中...";
            socket.send(JSON.stringify({ type: 'login', payload: { username: user } }));
        };

        document.getElementById('startBtn').onclick = function () {
            const sName = document.getElementById('sessionNameInput').value || 'New Adventure';
            this.disabled = true;
            this.innerText = "正在构建世界大纲...";
            setupStatus.innerText = "正在初始化时空维度与大纲缓存...";
            socket.send(JSON.stringify({
                type: 'create_session',
                payload: { sessionName: sName, worldStyle: 'fantasy', difficulty: 'normal' }
            }));
        };

        sendBtn.onclick = handleSend;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSend(); };

        window.onload = initWebSocket;
    </script>
</body>

</html>
