<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI角色驱动开放世界游戏</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            min-height: 400px;
        }
        
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #playerInput {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .status.connected {
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid #4CAF50;
        }
        
        .status.disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 1px solid #f44336;
        }
        
        .response {
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }
        
        .response.player {
            background: rgba(33, 150, 243, 0.3);
            border-left: 4px solid #2196F3;
            margin-left: 20px;
        }
        
        .response.character {
            background: rgba(255, 193, 7, 0.3);
            border-left: 4px solid #FFC107;
        }
        
        .response.narrator {
            background: rgba(156, 39, 176, 0.3);
            border-left: 4px solid #9C27B0;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .action-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .help {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .settings-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border-radius: 15px;
            padding: 30px;
            min-width: 400px;
            z-index: 1000;
            display: none;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .settings-panel h3 {
            margin-top: 0;
            text-align: center;
            color: #fff;
        }
        
        .settings-group {
            margin-bottom: 20px;
        }
        
        .settings-group label {
            display: block;
            margin-bottom: 5px;
            color: #ccc;
        }
        
        .settings-group input,
        .settings-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }
        
        .save-slot {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .save-slot.empty {
            opacity: 0.6;
        }
        
        .save-info {
            flex: 1;
        }
        
        .save-info .save-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .save-info .save-details {
            font-size: 12px;
            color: #ccc;
        }
        
        .save-actions {
            display: flex;
            gap: 10px;
        }
        
        .save-actions button {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 AI角色驱动开放世界游戏</h1>
        
        <div id="connectionStatus" class="status disconnected">
            ⚡ 连接状态: 未连接
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="response narrator">
                <strong>系统</strong>: 欢迎来到AI驱动的开放世界！正在连接到游戏服务器...
            </div>
        </div>
        
        <div class="input-area">
            <input type="text" id="playerInput" placeholder="输入你的行动或对话..." disabled>
            <button id="sendButton" onclick="sendInput()" disabled>发送</button>
            <button id="connectButton" onclick="connect()">连接</button>
            <button id="settingsButton" onclick="openSettings()">设置</button>
        </div>
        
        <div class="action-buttons" id="actionButtons"></div>
        
        <!-- 设置面板 -->
        <div class="overlay" id="overlay" onclick="closeSettings()"></div>
        <div class="settings-panel" id="settingsPanel">
            <h3>游戏设置</h3>
            
            <div class="settings-group">
                <label for="playerName">玩家名称：</label>
                <input type="text" id="playerName" placeholder="输入你的名称">
            </div>
            
            <div class="settings-group">
                <label>游戏存档：</label>
                <div id="saveSlots">
                    <!-- 存档槽位将在这里动态生成 -->
                </div>
                <button onclick="saveGame()" style="width: 100%; margin-top: 10px;">保存游戏</button>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="closeSettings()" style="margin-right: 10px;">关闭</button>
                <button onclick="resetGame()" style="background: #f44336;">重置游戏</button>
            </div>
        </div>
        
        <div class="help">
            <strong>使用说明:</strong><br>
            1. 点击"连接"按钮连接到游戏服务器<br>
            2. 在输入框中输入你的行动或对话<br>
            3. 或者点击快捷操作按钮<br>
            4. 与AI角色互动，探索开放世界！
        </div>
    </div>

    <script>
        class SimpleGameClient {
            constructor() {
                this.ws = null;
                this.isConnected = false;
                this.sessionId = null;
                this.isProcessing = false;
                this.playerName = localStorage.getItem('playerName') || '玩家';
                this.initializeUI();
            }
            
            initializeUI() {
                // 初始化玩家名称
                const playerNameInput = document.getElementById('playerName');
                if (playerNameInput) {
                    playerNameInput.value = this.playerName;
                }
                
                // 初始化存档槽位
                this.refreshSaveSlots();
            }
            
            connect() {
                const url = 'ws://localhost:8080';
                console.log('Connecting to:', url);
                
                try {
                    this.ws = new WebSocket(url);
                    
                    this.ws.onopen = () => {
                        console.log('Connected to game server');
                        this.isConnected = true;
                        this.updateConnectionStatus(true);
                        this.addMessage('系统', '✓ 成功连接到游戏服务器！正在创建游戏会话...', 'narrator');
                        
                        // 请求创建会话
                        this.sendMessage('create_session', {
                            playerId: 'web_player_' + Date.now()
                        });
                    };
                    
                    this.ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);
                            this.handleMessage(message);
                        } catch (error) {
                            console.error('Error parsing message:', error);
                        }
                    };
                    
                    this.ws.onclose = () => {
                        console.log('Disconnected from game server');
                        this.isConnected = false;
                        this.updateConnectionStatus(false);
                        this.addMessage('系统', '❌ 与游戏服务器断开连接', 'narrator');
                    };
                    
                    this.ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        this.addMessage('系统', '❌ 连接错误，请检查服务器是否运行', 'narrator');
                    };
                    
                } catch (error) {
                    console.error('Connection failed:', error);
                    this.addMessage('系统', '❌ 连接失败: ' + error.message, 'narrator');
                }
            }
            
            disconnect() {
                if (this.ws) {
                    this.ws.close();
                }
            }
            
            sendMessage(type, payload) {
                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    console.warn('WebSocket not connected');
                    return;
                }
                
                const message = {
                    type,
                    payload,
                    timestamp: new Date()
                };
                
                this.ws.send(JSON.stringify(message));
            }
            
            handleMessage(message) {
                console.log('Received message:', message.type, message.payload);
                
                switch (message.type) {
                    case 'session_created':
                        this.sessionId = message.payload.sessionId;
                        this.addMessage('系统', `🎮 游戏会话已创建 (${this.sessionId.substring(0, 8)}...)`, 'narrator');
                        this.addMessage('系统', '🏰 你现在站在镇中心广场。输入你的行动开始冒险吧！', 'narrator');
                        break;
                        
                    case 'character_response':
                        const response = message.payload;
                        this.addMessage(response.characterName, response.content, 'character');
                        this.isProcessing = false;
                        this.updateUI();
                        break;
                        
                    case 'action_options_update':
                        this.updateActionButtons(message.payload.options);
                        break;
                        
                    case 'game_state_update':
                        const state = message.payload;
                        this.addMessage('系统', `📍 当前位置: ${state.currentLocation} | 时间: ${state.currentTime}`, 'narrator');
                        break;
                        
                    case 'error':
                        this.addMessage('系统', '❌ ' + message.payload.message, 'narrator');
                        this.isProcessing = false;
                        this.updateUI();
                        break;
                }
            }
            
            sendPlayerInput(input) {
                if (!this.sessionId) {
                    this.addMessage('系统', '❌ 请先连接到游戏服务器', 'narrator');
                    return;
                }
                
                this.addMessage('你', input, 'player');
                this.isProcessing = true;
                this.updateUI();
                
                this.sendMessage('player_input', {
                    sessionId: this.sessionId,
                    playerId: 'web_player',
                    input: input
                });
            }
            
            sendAction(actionId) {
                if (!this.sessionId) {
                    this.addMessage('系统', '❌ 请先连接到游戏服务器', 'narrator');
                    return;
                }
                
                this.isProcessing = true;
                this.updateUI();
                
                this.sendMessage('player_action', {
                    sessionId: this.sessionId,
                    playerId: 'web_player',
                    action: { actionId }
                });
            }
            
            addMessage(sender, content, type) {
                const gameArea = document.getElementById('gameArea');
                const messageDiv = document.createElement('div');
                messageDiv.className = `response ${type}`;
                messageDiv.innerHTML = `<strong>${sender}</strong>: ${content}`;
                gameArea.appendChild(messageDiv);
                gameArea.scrollTop = gameArea.scrollHeight;
            }
            
            updateConnectionStatus(connected) {
                const statusElement = document.getElementById('connectionStatus');
                if (connected) {
                    statusElement.className = 'status connected';
                    statusElement.innerHTML = '⚡ 连接状态: 已连接到游戏服务器';
                } else {
                    statusElement.className = 'status disconnected';
                    statusElement.innerHTML = '⚡ 连接状态: 未连接';
                }
                this.updateUI();
            }
            
            updateActionButtons(options) {
                const container = document.getElementById('actionButtons');
                container.innerHTML = '';
                
                options.forEach(option => {
                    const button = document.createElement('button');
                    button.className = 'action-button';
                    button.textContent = option.label;
                    button.onclick = () => this.sendAction(option.id);
                    container.appendChild(button);
                });
            }
            
            updateUI() {
                const input = document.getElementById('playerInput');
                const sendButton = document.getElementById('sendButton');
                const connectButton = document.getElementById('connectButton');
                
                const canInput = this.isConnected && this.sessionId && !this.isProcessing;
                
                input.disabled = !canInput;
                sendButton.disabled = !canInput;
                connectButton.disabled = this.isConnected;
                
                if (this.isProcessing) {
                    sendButton.innerHTML = '<div class="loading"></div>';
                } else {
                    sendButton.innerHTML = '发送';
                }
                
                if (canInput) {
                    input.placeholder = '输入你的行动或对话...';
                } else if (this.isProcessing) {
                    input.placeholder = '正在处理中...';
                } else if (!this.isConnected) {
                    input.placeholder = '请先连接到游戏服务器';
                } else {
                    input.placeholder = '正在初始化游戏会话...';
                }
            }
            
            // 设置玩家名称
            setPlayerName(name) {
                this.playerName = name;
                localStorage.setItem('playerName', name);
            }
            
            // 保存游戏
            saveGame(slotIndex = null) {
                if (!this.sessionId) {
                    this.addMessage('系统', '⚠️ 请先连接到游戏服务器', 'narrator');
                    return;
                }
                
                const saveData = {
                    sessionId: this.sessionId,
                    playerName: this.playerName,
                    timestamp: new Date().toISOString(),
                    location: '未知位置' // 这里应该从游戏状态获取
                };
                
                // 选择存档槽位
                if (slotIndex === null) {
                    // 自动选择空闲槽位或首个槽位
                    for (let i = 1; i <= 5; i++) {
                        if (!localStorage.getItem(`gameSave_${i}`)) {
                            slotIndex = i;
                            break;
                        }
                    }
                    if (slotIndex === null) {
                        slotIndex = 1; // 默认覆盖第一个槽位
                    }
                }
                
                const saveName = `${this.playerName}的冒险 - ${new Date().toLocaleDateString()}`;
                saveData.saveName = saveName;
                
                localStorage.setItem(`gameSave_${slotIndex}`, JSON.stringify(saveData));
                this.addMessage('系统', `✅ 游戏已保存到槽位 ${slotIndex}: ${saveName}`, 'narrator');
                this.refreshSaveSlots();
            }
            
            // 读取游戏
            loadGame(slotIndex) {
                const saveData = localStorage.getItem(`gameSave_${slotIndex}`);
                if (!saveData) {
                    this.addMessage('系统', '⚠️ 没有找到存档数据', 'narrator');
                    return;
                }
                
                try {
                    const data = JSON.parse(saveData);
                    // 这里应该发送读档请求给服务器
                    // 现在只是模拟加载
                    this.addMessage('系统', `✨ 正在加载存档: ${data.saveName}`, 'narrator');
                    this.addMessage('系统', `⚠️ 注意：读档功能仅为演示，实际需要服务器支持`, 'narrator');
                    closeSettings();
                } catch (error) {
                    this.addMessage('系统', '❌ 存档数据损坏', 'narrator');
                }
            }
            
            // 删除存档
            deleteGame(slotIndex) {
                if (confirm('确定要删除这个存档吗？')) {
                    localStorage.removeItem(`gameSave_${slotIndex}`);
                    this.addMessage('系统', `✅ 已删除槽位 ${slotIndex} 的存档`, 'narrator');
                    this.refreshSaveSlots();
                }
            }
            
            // 刷新存档槽位显示
            refreshSaveSlots() {
                const container = document.getElementById('saveSlots');
                if (!container) return;
                
                container.innerHTML = '';
                
                for (let i = 1; i <= 5; i++) {
                    const saveData = localStorage.getItem(`gameSave_${i}`);
                    const slot = document.createElement('div');
                    slot.className = 'save-slot' + (saveData ? '' : ' empty');
                    
                    if (saveData) {
                        try {
                            const data = JSON.parse(saveData);
                            slot.innerHTML = `
                                <div class="save-info">
                                    <div class="save-name">槽位 ${i}: ${data.saveName || '未命名存档'}</div>
                                    <div class="save-details">玩家: ${data.playerName} | 时间: ${new Date(data.timestamp).toLocaleString()}</div>
                                </div>
                                <div class="save-actions">
                                    <button onclick="gameClient.loadGame(${i})">读取</button>
                                    <button onclick="gameClient.deleteGame(${i})" style="background: #f44336;">删除</button>
                                </div>
                            `;
                        } catch (error) {
                            slot.innerHTML = `
                                <div class="save-info">
                                    <div class="save-name">槽位 ${i}: 损坏的存档</div>
                                    <div class="save-details">无法读取存档数据</div>
                                </div>
                                <div class="save-actions">
                                    <button onclick="gameClient.deleteGame(${i})" style="background: #f44336;">删除</button>
                                </div>
                            `;
                        }
                    } else {
                        slot.innerHTML = `
                            <div class="save-info">
                                <div class="save-name">槽位 ${i}: 空闲</div>
                                <div class="save-details">可用于保存新游戏</div>
                            </div>
                            <div class="save-actions">
                                <button onclick="gameClient.saveGame(${i})">保存到此</button>
                            </div>
                        `;
                    }
                    
                    container.appendChild(slot);
                }
            }
        }
        
        // 全局游戏客户端实例
        const gameClient = new SimpleGameClient();
        
        // 全局函数
        function connect() {
            gameClient.connect();
        }
        
        function sendInput() {
            const input = document.getElementById('playerInput');
            const text = input.value.trim();
            if (text) {
                gameClient.sendPlayerInput(text);
                input.value = '';
            }
        }
        
        function openSettings() {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('settingsPanel').style.display = 'block';
            
            // 更新玩家名称输入框
            const playerNameInput = document.getElementById('playerName');
            if (playerNameInput) {
                playerNameInput.value = gameClient.playerName;
            }
            
            gameClient.refreshSaveSlots();
        }
        
        function closeSettings() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('settingsPanel').style.display = 'none';
            
            // 保存玩家名称
            const playerNameInput = document.getElementById('playerName');
            if (playerNameInput && playerNameInput.value.trim()) {
                gameClient.setPlayerName(playerNameInput.value.trim());
            }
        }
        
        function saveGame() {
            gameClient.saveGame();
        }
        
        function resetGame() {
            if (confirm('确定要重置游戏吗？这将清除所有数据！')) {
                // 清除所有存档
                for (let i = 1; i <= 5; i++) {
                    localStorage.removeItem(`gameSave_${i}`);
                }
                localStorage.removeItem('playerName');
                
                // 重新加载页面
                location.reload();
            }
        }
        
        // 回车键发送
        document.getElementById('playerInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendInput();
            }
        });
        
        // 页面加载完成后的初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Game interface loaded');
            gameClient.updateUI();
            
            // 显示启动提示
            gameClient.addMessage('系统', '🎯 游戏界面已加载完成！点击"连接"按钮开始游戏。', 'narrator');
            gameClient.addMessage('系统', '📋 确保游戏服务器正在运行 (npm run dev:server)', 'narrator');
            gameClient.addMessage('系统', '⚙️ 点击"设置"按钮可以设置用户名和管理存档。', 'narrator');
        });
    </script>
</body>
</html>
